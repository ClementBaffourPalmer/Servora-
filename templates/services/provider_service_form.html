{% extends "base.html" %}
{% block title %}Service — BookNest{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <h1 class="h3 mb-3">{% if form.instance.pk %}Edit service{% else %}New service{% endif %}</h1>
      <form method="post" enctype="multipart/form-data" class="card card-body">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary">Save</button>
      </form>
    </div>
  </div>
{% endblock %}
