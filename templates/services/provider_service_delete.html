{% extends "base.html" %}
{% block title %}Delete Service — Servora{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card card-body">
        <h1 class="h4 mb-2">Delete service</h1>
        <p class="text-muted">Are you sure you want to delete <strong>{{ service.name }}</strong>? This cannot be undone.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button class="btn btn-danger">Yes, delete</button>
            <a class="btn btn-outline-secondary" href="{% url 'provider_services' %}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
