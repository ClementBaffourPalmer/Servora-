{% extends "base.html" %}
{% block title %}Provider Payment Details — Servora{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Payment Details</h1>
        <a class="btn btn-outline-secondary btn-sm" href="{% url 'provider_dashboard' %}">Back</a>
      </div>
      <div class="card">
        <div class="card-body">
          <p class="text-muted">Add Mobile Money or Bank account details to receive direct payments.</p>
          <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary" type="submit">Save payment details</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
